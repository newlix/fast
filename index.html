<!DOCTYPE html>
<html>
<head>
	<title></title>
	<style>

body {
  text-align: center;
  font-size: 100px;
  font-family: "monaco";
}

#days {
  font-size: 500px;
}

</style>
</head>
<body>
  <div id="days">00</div>
  <span id="hours">00</span>:<span id="minutes">00</span>:<span id="seconds">00</span>
<script type="text/javascript">
  var start = new Date("May 27, 2020 00:00:00");
  update();
  window.setInterval(function(){ update(); }, 1000);

function update() {
  var now = new Date();
  var t = Math.floor((now - start) / 1000);
  document.getElementById('seconds').innerHTML = format2d(t % 60);
  t = Math.floor(t/60);
  document.getElementById('minutes').innerHTML = format2d(t % 60);
  t = Math.floor(t/60);
  document.getElementById('hours').innerHTML = format2d(t % 24);
  document.getElementById('days').innerHTML = Math.floor(t / 24);
}

function format2d(t) {
  return t.toString().padStart(2, "0");
}

</script>
</body>
</html>
