<!DOCTYPE html>
<html>
<head>
	<title></title>
	<style>

body {
  text-align: center;
  font-size: 100px;
  font-family: "monaco";
}

#days {
  font-size: 500px;
}

</style>
</head>
<body>
  <div id="days">00</div>
  <span id="hours">00</span>:<span id="minutes">00</span>:<span id="seconds">00</span>
<script type="text/javascript">
  var start = new Date("May 26, 2020 00:00:00");
  update();
  window.setInterval(function(){ update(); }, 1000);

function update() {
  var now = new Date();
  var msec = now - start;
  var dd = Math.floor(msec / 1000 / 60 / 60 / 24);
  msec -= dd * 1000 * 60 * 60 * 24;
  var hh = Math.floor(msec / 1000 / 60 / 60);
  msec -= hh * 1000 * 60 * 60;
  var mm = Math.floor(msec / 1000 / 60);
  msec -= mm * 1000 * 60;
  var ss = Math.floor(msec / 1000);
  msec -= ss * 1000;

  console.log(msec);
  document.getElementById('days').innerHTML = dd;
  document.getElementById('hours').innerHTML = hh.toString().padStart(2, "0");
  document.getElementById('minutes').innerHTML = mm.toString().padStart(2, "0");
  document.getElementById('seconds').innerHTML = ss.toString().padStart(2, "0");
}

</script>
</body>
</html>
